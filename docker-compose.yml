services:
  web:
    build: .
    ports: ["8080:8080"]
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    volumes: ["xray-data:/app/data"]
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
volumes:
  xray-data:
